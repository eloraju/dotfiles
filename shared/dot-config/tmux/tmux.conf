set -ga terminal-overrides ",screen-256color*:Tc"
set -g default-terminal "screen-256color"
set -g status-style 'bg=#333333 fg=#5eacd3'

# window numbering start from 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set-environment -g PATH "$HOME/.local/user/scripts/:$HOME/.local/user/scripts/utils/:$PATH"

# enable mouse support
setw -g mouse on

set -g prefix C-a
# sensible tmux will set this but i'll have this here in case i forget to 
# install tpm on a new system
bind-key C-a send-prefix
# sensible unbinds the default prefix if new prefix is set, but this stays
# with the same reasoning as above
unbind C-b

set-window-option -g mode-keys vi

bind r source-file ~/.config/tmux/tmux.conf; display "config reloaded"

# vim-like copy
# prefix + v => enter copy mode
bind v copy-mode
# this is like vim's visual mode
bind -T copy-mode-vi v send-keys -X begin-selection
# and this is da yank
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

bind = select-layout main-vertical
bind q kill-pane

# pane creation
bind K split-window -vb -c "#{pane_current_path}"
bind J split-window -v -c "#{pane_current_path}"
bind H split-window -hb -c "#{pane_current_path}"
bind L split-window -h -c "#{pane_current_path}"

bind N run-shell "__tmux_utils new_session"

# pane resize
bind -r k resize-pane -U 5
bind -r j resize-pane -T 5
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5
# toggle "fullscreen"
bind -r C-f resize-pane -Z

bind S run-shell "tms"
bind ? customize-mode

# forget the find window.  That is for chumps
# Based on the tms script by ThePrimagen
bind-key f popup -E ~/.local/user/scripts/tms

# Dynamic git status
set -g @git_info ""
run-shell "__tmux_utils git_branch"
set -g status-right ""

set-hook -g pane-focus-in "run-shell '$HOME/.local/user/scripts/utils/__tmux_utils git_branch'"

# Styling
# Status line styling
set -g status-position top
set -g status-justify absolute-centre
set -g status-left-length 150
set -g status-right-length 150
set -g status-style "fg=$THEME_FG,bg=$THEME_BG"
set -g status-left "#[fg=$THEME_PURPLE,bold]   #S #[fg=default,nobold]  #{@git_info}"
set -g window-status-current-format "#[fg=$THEME_TEAL,bold] #[underscore]#I:#W#[default]"
set -g window-status-format "#I:#W"
set -g message-style "fg=$THEME_FG,bg=$THEME_BLUE0"
set -g mode-style "fg=$THEME_FG_GUTTER,bg=$THEME_GREEN2"

# Pane styling
set -g pane-border-indicators colour
set -g pane-border-lines single
set -g pane-border-status top
set -g pane-border-format ""


# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.config/tmux/plugins/tpm/tpm'
