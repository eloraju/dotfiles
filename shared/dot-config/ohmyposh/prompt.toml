console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 3
final_space = true

[palette]
  black = '#262B44'
  blue = '#4B95E9'
  green = '#59C9A5'
  orange = '#F07623'
  purple = '#B381C5'
  red = '#D81E5B'
  white = '#E0DEF4'
  yellow = '#F3AE35'

[secondary_prompt]
  template = '❯❯'
  foreground = 'green'
  background = 'transparent'

[transient_prompt]
  template = '❯ '
  foreground = 'cyan'
  background = 'transparent'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '{{ if .SSHSession }}({{ .HostName }}){{ end }} '
    foreground = 'p:white'
    background = 'transparent'
    type = 'session'

  [[blocks.segments]]
    style = 'plain'
    template = '{{ path .Path .Location }} '
    foreground = 'cyan'
    background = 'transparent'
    type = 'path'

    [blocks.segments.properties]
      style = 'full'

  [[blocks.segments]]
    template = '{{ if gt .Behind 0 }}<red>↓</>{{ end }}{{ if gt .Ahead 0 }}<red>↑</>{{ end }}{{ .HEAD }}{{ if gt .StashCount 0}}<red>$</>{{ end }}{{ if .Working.Changed }}<red>[{{ if gt .Working.Modified 0 }}!{{ end }}{{ if gt .Working.Deleted 0 }}-{{ end }}{{ if gt .Working.Added 0 }}+{{ end }}{{ if gt .Working.Untracked 0 }}?{{ end }}]</>{{ end }}{{ if or (.Staging.Changed) }}<yellow>[{{ if gt .Staging.Modified 0 }}!{{ end }}{{ if gt .Staging.Deleted 0 }}-{{ end }}{{ if gt .Staging.Added 0 }}+{{ end }}]</>{{ end }}'
    foreground = 'p:purple'
    background = 'transparent'
    type = 'git'

    [blocks.segments.properties]
      branch_icon = ''
      branch_max_length = 25
      commit_icon = '@'
      fetch_status = true
      fetch_upstream_icon = true

      [blocks.segments.properties.status_formats]
        Added = '+%d'
        Deleted = '-%d'
        Modified = '~%d'
        Unmerged = 'x%d'
        Untracked = '?%d'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '❯'
    background = 'transparent'
    type = 'text'
    foreground_templates = ['{{ if gt .Code 0 }}red{{ end }}', '{{ if eq .Code 0 }}green{{ end }}']
