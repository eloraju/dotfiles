# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version: 3
final_space: true
console_title_template: "{{ .Shell }} in {{ .Folder }}"

blocks:
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: session
        foreground: p:white
        background: transparent
        template: "{{ if .SSHSession }}({{ .HostName }}){{ end }} "

      - type: path
        style: plain
        foreground: cyan
        background: transparent
        template: "{{ path .Path .Location }} "
        properties:
          style: full

      - type: git
        foreground: p:purple
        background: transparent
        template: "{{ if gt .Behind 0 }}<red>↓</>{{ end }}{{ if gt .Ahead 0
          }}<red>↑</>{{ end }}{{ .HEAD }}{{ if gt .StashCount 0}}<red>$</>{{ end
          }}{{ if .Working.Changed }}<red>[{{ if gt .Working.Modified 0 }}!{{
          end }}{{ if gt .Working.Deleted 0 }}-{{ end }}{{ if gt .Working.Added
          0 }}+{{ end }}{{ if gt .Working.Untracked 0 }}?{{ end }}]</>{{ end
          }}{{ if or (.Staging.Changed) }}<yellow>[{{ if gt .Staging.Modified 0
          }}!{{ end }}{{ if gt .Staging.Deleted 0 }}-{{ end }}{{ if gt
          .Staging.Added 0 }}+{{ end }}]</>{{ end }}"
        properties:
          commit_icon: "@"
          branch_icon: ""
          branch_max_length: 25
          fetch_status: true
          fetch_upstream_icon: true
          status_formats:
            Added: +%d
            Untracked: ?%d
            Modified: ~%d
            Deleted: -%d
            Unmerged: x%d

  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: text
        foreground_templates:
          - "{{ if gt .Code 0 }}red{{ end }}"
          - "{{ if eq .Code 0 }}green{{ end }}"
        background: transparent
        template: ❯

transient_prompt:
  foreground: cyan
  background: transparent
  template: "❯ "

secondary_prompt:
  foreground: green
  background: transparent
  template: ❯❯

palette:
  black: "#262B44"
  blue: "#4B95E9"
  green: "#59C9A5"
  orange: "#F07623"
  red: "#D81E5B"
  white: "#E0DEF4"
  yellow: "#F3AE35"
  purple: "#B381C5"
